<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Home - BBC Bitesize </title>
    <style>
        :root{--bg:#f7f8fb;--card:#ffffff;--accent:#0078d4;--muted:#6b7280}
        html,body{height:100%}
        body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,"Helvetica Neue",Arial,sans-serif;background:var(--bg);color:#0f1720;line-height:1.5}
        .wrap{max-width:1100px;margin:0 auto;padding:2rem}
        header{display:flex;align-items:center;justify-content:space-between;padding:0.5rem 0}
        .brand{font-weight:700;font-size:1.25rem}
        nav a{margin-left:1rem;color:inherit;text-decoration:none;font-weight:500}
        .hero{display:grid;gap:1.5rem;align-items:center;padding:3rem 0}
        h1{margin:0 0 .5rem;font-size:1.9rem}
        .lead{color:var(--muted);margin:0 0 1rem}
        .btn{display:inline-block;background:var(--accent);color:#fff;padding:.7rem 1.1rem;border-radius:8px;text-decoration:none;font-weight:600}
        .card{background:var(--card);padding:1.2rem;border-radius:10px;box-shadow:0 6px 18px rgba(12,18,26,.06)}
        .grid{display:grid;gap:1rem}
        .features{grid-template-columns:repeat(auto-fit,minmax(220px,1fr));margin-top:1rem}
        footer{padding:2rem 0;color:var(--muted);font-size:.95rem;border-top:1px solid rgba(15,23,32,.06);margin-top:2rem}
        @media(min-width:880px){.hero{grid-template-columns:1fr 380px} h1{font-size:2.6rem}}
    </style>
</head>
<body>
    <div class="wrap">
        <header>
            <div class="brand">MemerMan26's Games</div>
        </header>
        <main>
            <section id="play" class="card" style="margin-top:1.5rem;">
                <h2 style="margin-top:0;margin-bottom:.5rem;">Games</h2>
                <ul style="list-style:none;padding:0;margin:0;">
                    <li style="margin:0.4rem 0;"><a href="clchessclassic.html" style="color:var(--accent);text-decoration:none;font-weight:600;">Chess</a></li>
                    <li style="margin:0.4rem 0;"><a href="cldoomdos.html" style="color:var(--accent);text-decoration:none;font-weight:600;">Doom</a></li>
                    <li style="margin:0.4rem 0;"><a href="clgranturismo2.html" style="color:var(--accent);text-decoration:none;font-weight:600;">Gran Turismo 2</a></li>
                    <li style="margin:0.4rem 0;"><a href="clhalflife.html" style="color:var(--accent);text-decoration:none;font-weight:600;">Half Life</a></li>
                    <li style="margin:0.4rem 0;"><a href="clloz1.html" style="color:var(--accent);text-decoration:none;font-weight:600;">Legend Of Zelda</a></li>
                    <li style="margin:0.4rem 0;"><a href="clparappatherapper.html" style="color:var(--accent);text-decoration:none;font-weight:600;">Parappa The Rapper</a></li>
                    <li style="margin:0.4rem 0;"><a href="clpokesoulsilver.html" style="color:var(--accent);text-decoration:none;font-weight:600;">Pokemon Soul Silver</a></li>
                    <li style="margin:0.4rem 0;"><a href="clquake3.html" style="color:var(--accent);text-decoration:none;font-weight:600;">Quake 3</a></li>
                </ul>
            </section>
        </main>

    </div>
</body>
</html>
